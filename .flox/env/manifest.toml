schema-version = "1.12.0"

[install]
go.pkg-path = "go"
go.version = "^1.26.2"
golangci-lint.pkg-path = "golangci-lint"
golangci-lint.version = "^2.12.2"
infer.flake = "github:inference-gateway/cli/v0.112.1"
claude-code.pkg-path = "claude-code"
claude-code.version = "^2.1.148"
claude-code.pkg-group = "ai"
codex.pkg-path = "codex"
codex.version = "^0.133.0"
codex.pkg-group = "ai"

[hook]
on-activate = """
  export GOENV="$FLOX_ENV_CACHE/goenv"
  go get .
"""
